<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 100px;
      margin: 0;
      color: #38bdf8;
    }

    h2 {
      margin: 10px 0;
      font-size: 24px;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
    }

    .emoji {
      font-size: 50px;
      margin-bottom: 10px;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 70px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="emoji">🚫</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Oops! The page you're looking for doesn't exist or has been moved.</p>

    <a href="index.html" class="btn">← Back to Home</a>
  </div>

</body>
</html>
